version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: agencia_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agenciaviajes
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data_agencia:/var/lib/mysql

volumes:
  mysql_data_agencia:
